<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Service</title>
    <!-- AWS SDK removed — replaced with plain fetch() and Azure Blob Storage SAS URLs -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .file-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #e0e0e0;
        }

        .file-info h3 {
            font-size: 1em;
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .file-info p {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 3px;
        }

        .file-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main App -->
        <div id="mainApp">
            <div class="card">
                <h2 class="section-title">Upload Image</h2>

                <form id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Select Image *</label>
                        <input type="file" id="fileInput" name="file" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Optional description of your image"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="e.g., vacation, 2024, beach">
                    </div>

                    <button type="submit" class="btn" id="uploadBtn">Upload Image</button>

                    <div id="uploadStatus"></div>
                </form>
            </div>

            <div class="card">
                <h2 class="section-title">My Images</h2>

                <div class="form-group">
                    <label for="prefixFilter">Filter by prefix (optional)</label>
                    <input type="text" id="prefixFilter" placeholder="e.g., a specific file ID prefix">
                </div>

                <button class="btn" id="refreshBtn" onclick="loadFiles()">Refresh List</button>
                <div id="filesList"></div>
            </div>
        </div>
    </div>

    <script>
        // ── Azure Function App configuration ──────────────────────────────────
        // Replace <YOUR_FUNCTION_APP_NAME> with the deployed Function App hostname,
        // e.g. "dev-imageupload-func-australiaeast.azurewebsites.net"
        const FUNCTION_APP_HOST = 'https://<YOUR_FUNCTION_APP_NAME>.azurewebsites.net';
        const API_BASE_URL = `${FUNCTION_APP_HOST}/api`;
        // ─────────────────────────────────────────────────────────────────────

        // ── Upload form ───────────────────────────────────────────────────────
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('fileInput');
            const description = document.getElementById('description').value;
            const tagsInput = document.getElementById('tags').value;
            const uploadBtn = document.getElementById('uploadBtn');
            const statusDiv = document.getElementById('uploadStatus');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = '<div class="status error">Please select a file</div>';
                return;
            }

            const file = fileInput.files[0];
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];

            try {
                uploadBtn.disabled = true;
                statusDiv.innerHTML = '<div class="status info">Requesting upload URL...</div>';

                // ── Step 1: obtain a Blob SAS write URL from the Function App ──
                const uploadResponse = await fetch(`${API_BASE_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: file.name,
                        fileType: file.type || 'application/octet-stream',
                        description: description,
                        tags: tags
                    })
                });

                if (!uploadResponse.ok) {
                    const errorText = await uploadResponse.text();
                    throw new Error(`Failed to get upload URL: ${uploadResponse.statusText} — ${errorText}`);
                }

                const uploadData = await uploadResponse.json();
                statusDiv.innerHTML = '<div class="status info">Uploading file to Azure Blob Storage...</div>';

                // ── Step 2: PUT the raw file to the SAS URL ───────────────────
                // Azure Blob Storage SAS (write) requires PUT, not POST.
                // Build x-ms-meta-* headers from the metadata dict returned by
                // the Function so that blob properties match the original S3 metadata.
                const blobHeaders = {
                    'Content-Type': file.type || 'application/octet-stream',
                    'x-ms-blob-type': 'BlockBlob'
                };
                if (uploadData.metadata) {
                    for (const [key, value] of Object.entries(uploadData.metadata)) {
                        blobHeaders[`x-ms-meta-${key}`] = value;
                    }
                }

                const blobResponse = await fetch(uploadData.uploadUrl, {
                    method: 'PUT',
                    headers: blobHeaders,
                    body: file
                });

                if (!blobResponse.ok) {
                    const errorText = await blobResponse.text();
                    throw new Error(`Failed to upload file to storage: ${blobResponse.statusText} — ${errorText}`);
                }

                statusDiv.innerHTML = `<div class="status success">File uploaded successfully! File ID: ${uploadData.fileId}</div>`;

                // Reset form
                document.getElementById('fileInput').value = '';
                document.getElementById('description').value = '';
                document.getElementById('tags').value = '';

                // Refresh file list
                setTimeout(() => loadFiles(), 1000);

            } catch (error) {
                console.error('Upload error:', error);
                statusDiv.innerHTML = `<div class="status error">Upload failed: ${error.message}</div>`;
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // ── Load / list files ─────────────────────────────────────────────────
        async function loadFiles() {
            const prefix = document.getElementById('prefixFilter').value.trim();
            const filesList = document.getElementById('filesList');
            const refreshBtn = document.getElementById('refreshBtn');

            try {
                refreshBtn.disabled = true;
                filesList.innerHTML = '<div class="loading"><div class="spinner"></div>Loading files...</div>';

                const url = new URL(`${API_BASE_URL}/files`);
                if (prefix) url.searchParams.set('prefix', prefix);

                // Plain fetch — no SigV4 signing needed; Functions use ANONYMOUS auth level
                const response = await fetch(url.toString());

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Failed to load files: ${response.statusText} — ${errorText}`);
                }

                const data = await response.json();

                if (data.files.length === 0) {
                    filesList.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p>No images uploaded yet</p>
                        </div>
                    `;
                } else {
                    const filesHTML = data.files.map(file => `
                        <div class="file-item" id="file-${file.fileId}">
                            <img src="${file.viewUrl}" alt="${file.fileName}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\'%3E%3Ctext x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23999\'%3EImage%3C/text%3E%3C/svg%3E'">
                            <div class="file-info">
                                <h3>${file.fileName}</h3>
                                <p><strong>File ID:</strong> ${file.fileId}</p>
                                ${file.description ? `<p><strong>Description:</strong> ${file.description}</p>` : ''}
                                <p><strong>Uploaded:</strong> ${new Date(file.uploadDate).toLocaleString()}</p>
                                ${file.tags && file.tags.length > 0 ? `
                                    <div class="file-tags">
                                        ${file.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                    </div>
                                ` : ''}
                                <button class="btn-delete" onclick="deleteFile('${file.fileId}', '${file.fileName}')">Delete</button>
                            </div>
                        </div>
                    `).join('');

                    filesList.innerHTML = `<div class="file-grid">${filesHTML}</div>`;
                }

            } catch (error) {
                console.error('Load files error:', error);
                filesList.innerHTML = `<div class="status error">Failed to load files: ${error.message}</div>`;
            } finally {
                refreshBtn.disabled = false;
            }
        }

        // ── Delete file ───────────────────────────────────────────────────────
        async function deleteFile(fileId, fileName) {
            if (!confirm(`Are you sure you want to delete "${fileName}"?`)) {
                return;
            }

            try {
                const fileElement = document.getElementById(`file-${fileId}`);
                const deleteBtn = fileElement.querySelector('.btn-delete');
                deleteBtn.disabled = true;
                deleteBtn.textContent = 'Deleting...';

                const response = await fetch(`${API_BASE_URL}/files/${encodeURIComponent(fileId)}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Failed to delete file: ${response.statusText} — ${errorText}`);
                }

                fileElement.remove();

                const filesList = document.getElementById('filesList');
                const tempMsg = document.createElement('div');
                tempMsg.className = 'status success';
                tempMsg.textContent = `"${fileName}" deleted successfully`;
                filesList.insertBefore(tempMsg, filesList.firstChild);
                setTimeout(() => tempMsg.remove(), 3000);

                if (document.querySelectorAll('.file-item').length === 0) {
                    loadFiles();
                }

            } catch (error) {
                console.error('Delete error:', error);
                alert(`Failed to delete file: ${error.message}`);

                const fileElement = document.getElementById(`file-${fileId}`);
                if (fileElement) {
                    const deleteBtn = fileElement.querySelector('.btn-delete');
                    deleteBtn.disabled = false;
                    deleteBtn.textContent = 'Delete';
                }
            }
        }

        // Auto-load files on page load
        window.addEventListener('load', loadFiles);
    </script>
</body>
</html>
