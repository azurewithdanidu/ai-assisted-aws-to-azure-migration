# =============================================================================
# Buildkite Pipeline — Image Upload Service
# Converted from: AWS CloudFormation deployment pipeline
# Now deploys: Azure Bicep templates to australiaeast
#
# Required Buildkite environment variables (set in pipeline settings):
#   AZURE_SUBSCRIPTION_ID      — Azure subscription ID
#   AZURE_RESOURCE_GROUP_DEV   — Resource group for dev environment
#   AZURE_RESOURCE_GROUP_STG   — Resource group for staging environment
#   AZURE_RESOURCE_GROUP_PROD  — Resource group for production environment
#   (Azure CLI authentication handled via Workload Identity Federation or
#    service principal: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID)
# =============================================================================

steps:
  # ---------------------------------------------------------------------------
  # Stage 1: Validate all Bicep templates
  # Replaces: aws cloudformation validate-template
  # ---------------------------------------------------------------------------
  - label: ":bicep: Validate Bicep Templates"
    key: "validate-bicep"
    commands:
      - echo "--- Validating Bicep templates"
      - az bicep build --file outputs/bicep-templates/main.bicep
      - az bicep build --file outputs/bicep-templates/modules/monitoring.bicep
      - az bicep build --file outputs/bicep-templates/modules/keyvault.bicep
      - az bicep build --file outputs/bicep-templates/modules/storage.bicep
      - az bicep build --file outputs/bicep-templates/modules/staticweb.bicep
      - az bicep build --file outputs/bicep-templates/modules/functions.bicep
      - echo "--- All Bicep templates validated successfully"
    agents:
      queue: default

  - wait

  # ---------------------------------------------------------------------------
  # Stage 2: What-If check for staging (preview changes before apply)
  # No AWS equivalent — key Azure safety check
  # ---------------------------------------------------------------------------
  - label: ":magnifying_glass: What-If Check (Staging)"
    key: "whatif-staging"
    commands:
      - echo "--- Running what-if analysis for staging"
      - |
        az deployment group what-if \
          --name "bicep-whatif-staging-${BUILDKITE_BUILD_NUMBER}" \
          --subscription "${AZURE_SUBSCRIPTION_ID}" \
          --resource-group "${AZURE_RESOURCE_GROUP_STG}" \
          --template-file outputs/bicep-templates/main.bicep \
          --parameters outputs/bicep-templates/parameters/staging.bicepparam \
          --mode Incremental \
          --result-format FullResourcePayloads
      - echo "--- What-if analysis complete"
    agents:
      queue: default
    depends_on: "validate-bicep"

  - wait

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy to Staging
  # Replaces: aws cloudformation deploy --stack-name staging-stack
  # ---------------------------------------------------------------------------
  - label: ":azure: Deploy to Staging"
    key: "deploy-staging"
    commands:
      - echo "--- Deploying to staging environment"
      - |
        DEPLOYMENT_NAME="bicep-staging-${BUILDKITE_BUILD_NUMBER}"
        az deployment group create \
          --name "${DEPLOYMENT_NAME}" \
          --subscription "${AZURE_SUBSCRIPTION_ID}" \
          --resource-group "${AZURE_RESOURCE_GROUP_STG}" \
          --template-file outputs/bicep-templates/main.bicep \
          --parameters outputs/bicep-templates/parameters/staging.bicepparam \
          --mode Incremental
        echo "Deployment completed: ${DEPLOYMENT_NAME}"
        echo "${DEPLOYMENT_NAME}" > /tmp/staging-deployment-name.txt
    agents:
      queue: default
    env:
      AZURE_SUBSCRIPTION_ID: "${AZURE_SUBSCRIPTION_ID}"
      AZURE_RESOURCE_GROUP_STG: "${AZURE_RESOURCE_GROUP_STG}"
    depends_on: "whatif-staging"

  - wait

  # ---------------------------------------------------------------------------
  # Stage 4: Integration Tests (run against staging)
  # Equivalent to: post-deployment test stage in original pipeline
  # ---------------------------------------------------------------------------
  - label: ":test_tube: Integration Tests (Staging)"
    key: "test-staging"
    commands:
      - echo "--- Running integration tests against staging"
      - npm run test:integration
    agents:
      queue: test-agents
    depends_on: "deploy-staging"

  - wait

  # ---------------------------------------------------------------------------
  # Stage 5: Manual approval gate before production deployment
  # ---------------------------------------------------------------------------
  - block: ":rocket: Approve Production Deployment"
    prompt: "Review staging test results and approve production deployment"
    key: "approve-prod"
    depends_on: "test-staging"

  # ---------------------------------------------------------------------------
  # Stage 6: What-If check for production
  # ---------------------------------------------------------------------------
  - label: ":magnifying_glass: What-If Check (Production)"
    key: "whatif-prod"
    commands:
      - echo "--- Running what-if analysis for production"
      - |
        az deployment group what-if \
          --name "bicep-whatif-prod-${BUILDKITE_BUILD_NUMBER}" \
          --subscription "${AZURE_SUBSCRIPTION_ID}" \
          --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
          --template-file outputs/bicep-templates/main.bicep \
          --parameters outputs/bicep-templates/parameters/prod.bicepparam \
          --mode Incremental \
          --result-format FullResourcePayloads
    agents:
      queue: default
    depends_on: "approve-prod"

  - wait

  # ---------------------------------------------------------------------------
  # Stage 7: Deploy to Production
  # Replaces: aws cloudformation deploy --stack-name prod-stack
  # ---------------------------------------------------------------------------
  - label: ":azure: Deploy to Production"
    key: "deploy-prod"
    commands:
      - echo "--- Deploying to production environment"
      - |
        DEPLOYMENT_NAME="bicep-prod-${BUILDKITE_BUILD_NUMBER}"
        az deployment group create \
          --name "${DEPLOYMENT_NAME}" \
          --subscription "${AZURE_SUBSCRIPTION_ID}" \
          --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
          --template-file outputs/bicep-templates/main.bicep \
          --parameters outputs/bicep-templates/parameters/prod.bicepparam \
          --mode Incremental
        echo "Production deployment completed: ${DEPLOYMENT_NAME}"
        echo "${DEPLOYMENT_NAME}" > /tmp/prod-deployment-name.txt
    agents:
      queue: default
    env:
      AZURE_SUBSCRIPTION_ID: "${AZURE_SUBSCRIPTION_ID}"
      AZURE_RESOURCE_GROUP_PROD: "${AZURE_RESOURCE_GROUP_PROD}"
    depends_on: "whatif-prod"

  - wait

  # ---------------------------------------------------------------------------
  # Stage 8: Post-deployment smoke tests (production)
  # ---------------------------------------------------------------------------
  - label: ":white_check_mark: Smoke Tests (Production)"
    key: "smoke-prod"
    commands:
      - echo "--- Running production smoke tests"
      - bash scripts/validate-deployment.sh "${AZURE_RESOURCE_GROUP_PROD}"
    agents:
      queue: default
    depends_on: "deploy-prod"
