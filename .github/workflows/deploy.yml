# =============================================================================
# deploy.yml — Combined CI/CD Pipeline
# Deploys: IaC (Bicep) → Azure Functions (Python) + Static Web App
#
# Authentication: OIDC Workload Identity Federation (no secrets stored)
# Required GitHub Secrets (OIDC — no client secret needed):
#   AZURE_CLIENT_ID          — App Registration client ID
#   AZURE_TENANT_ID          — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID    — Target subscription ID
#
# Required GitHub Secrets (deployment targets):
#   FUNCTION_APP_NAME        — Name of the Azure Function App resource
#   SWA_DEPLOYMENT_TOKEN     — From Azure portal → Static Web App → Manage deployment token
#
# Setup OIDC federated credential (run once):
#   az ad app create --display-name "gh-img-upload-dev"
#   az ad sp create --id <appId>
#   az role assignment create --assignee <spObjectId> \
#     --role Contributor \
#     --scope /subscriptions/<subscriptionId>
#   az ad app federated-credential create --id <appId> --parameters '{
#     "name": "gh-actions-main",
#     "issuer": "https://token.actions.githubusercontent.com",
#     "subject": "repo:<org>/<repo>:ref:refs/heads/main",
#     "audiences": ["api://AzureADTokenExchange"]
#   }'
# =============================================================================

name: Deploy — Image Upload Service

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev

# All three jobs need OIDC token issuance
permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2          # Matches dev.bicepparam
  BICEP_DIR: outputs/bicep-templates
  FUNCTIONS_DIR: outputs/azure-functions
  STATIC_DIR: outputs/static-web-app
  PYTHON_VERSION: '3.11'           # Azure Functions v4 supports 3.9–3.11 only

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Validate & Deploy Infrastructure (Bicep at subscription scope)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  deploy-infra:
    name: "1 · IaC — Bicep (subscription scope)"
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      # Expose any Bicep outputs (function app name, SWA name, etc.)
      # downstream jobs can use: ${{ needs.deploy-infra.outputs.<key> }}
      deployment_name: ${{ steps.deploy.outputs.deployment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Validation ──────────────────────────────────────────────────────
      - name: Bicep Lint
        run: |
          az bicep lint \
            --file ${{ env.BICEP_DIR }}/main.bicep

      - name: Bicep What-If (dry run)
        run: |
          az deployment sub what-if \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters ${{ env.BICEP_DIR }}/parameters/dev.bicepparam \
            --no-pretty-print

      # ── Deploy ──────────────────────────────────────────────────────────
      - name: Deploy Bicep
        id: deploy
        run: |
          DEPLOYMENT_NAME="deploy-dev-${{ github.run_id }}"
          echo "deployment_name=${DEPLOYMENT_NAME}" >> "$GITHUB_OUTPUT"

          az deployment sub create \
            --name "${DEPLOYMENT_NAME}" \
            --location ${{ env.AZURE_LOCATION }} \
            --template-file ${{ env.BICEP_DIR }}/main.bicep \
            --parameters ${{ env.BICEP_DIR }}/parameters/dev.bicepparam \
            --query "properties.outputs" \
            --output json | tee bicep-outputs.json

      - name: Upload Bicep outputs
        uses: actions/upload-artifact@v4
        with:
          name: bicep-outputs-dev-${{ github.run_id }}
          path: bicep-outputs.json
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy Azure Functions (Python 3.11)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-functions:
    name: "2 · Azure Functions — Python 3.11"
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-infra           # Wait for IaC to finish first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache pip downloads between runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('outputs/azure-functions/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Pre-install packages into the deployment package directory
      # scm-do-build-during-deployment is disabled so this is the only install
      - name: Install dependencies into package
        working-directory: ${{ env.FUNCTIONS_DIR }}
        run: |
          pip install \
            --target=".python_packages/lib/site-packages" \
            --upgrade \
            -r requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.FUNCTION_APP_NAME }}
          package: ${{ env.FUNCTIONS_DIR }}
          # Packages pre-installed above; do NOT rebuild on Kudu
          scm-do-build-during-deployment: false
          enable-oryx-build: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Deploy Static Web App
# ─────────────────────────────────────────────────────────────────────────────
  deploy-staticweb:
    name: "3 · Static Web App"
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-infra           # Wait for IaC to finish; can run parallel with job 2
    # Explicitly grant pull-requests permission for SWA action to post PR previews
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SWA action uses its own deployment token, not OIDC, so no azure/login needed.
      # The token comes from: Azure portal → Static Web App → Manage deployment token
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.STATIC_DIR }}
          # index.html is present — no framework build required
          skip_app_build: true
          output_location: ''
