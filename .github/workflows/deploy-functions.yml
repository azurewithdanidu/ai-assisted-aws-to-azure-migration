name: Deploy Azure Functions

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'outputs/azure-functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      functionAppName:
        description: 'Optional override for the Function App name'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-functions-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  determine-environment:
    name: Determine environment and app name
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      resource_group: ${{ steps.resolve.outputs.resource_group }}
      function_app_name: ${{ steps.resolve.outputs.function_app_name }}
    steps:
      - name: Derive environment and Function App name
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
            override_name="${{ inputs.functionAppName }}"
          else
            case "${{ github.ref_name }}" in
              dev) environment="dev" ;;
              staging) environment="staging" ;;
              main) environment="prod" ;;
              *)
                echo "Unsupported branch: ${{ github.ref_name }}" >&2
                exit 1
                ;;
            esac
            override_name=""
          fi

          function_app_name="${override_name:-photo-gallery-func-${environment}}"

          echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-photo-gallery-${environment}" >> "$GITHUB_OUTPUT"
          echo "function_app_name=${function_app_name}" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    name: Package and deploy Function App
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      RESOURCE_GROUP: ${{ needs.determine-environment.outputs.resource_group }}
      FUNCTION_APP_NAME: ${{ needs.determine-environment.outputs.function_app_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('outputs/azure-functions/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install requirements into .python_packages/lib/site-packages
        working-directory: outputs/azure-functions
        run: |
          if [ ! -f requirements.txt ]; then
            echo "Missing outputs/azure-functions/requirements.txt" >&2
            exit 1
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Zip the Function App payload
        working-directory: outputs/azure-functions
        run: |
          zip -r "$GITHUB_WORKSPACE/function-app.zip" . \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".venv/*" \
            -x "local.settings.json"

      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy with config-zip
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --src "$GITHUB_WORKSPACE/function-app.zip" \
            --build-remote false

      - name: Verify the Function App state
        run: |
          state=$(az functionapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --query state \
            --output tsv)
          if [ "$state" != "Running" ]; then
            echo "Function App is not running: $state" >&2
            exit 1
          fi

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-${{ needs.determine-environment.outputs.environment }}
          path: function-app.zip
          retention-days: 7

  rollback-guidance:
    name: Document rollback command
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - build-and-deploy
    if: failure()
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      RESOURCE_GROUP: ${{ needs.determine-environment.outputs.resource_group }}
      FUNCTION_APP_NAME: ${{ needs.determine-environment.outputs.function_app_name }}
    steps:
      - name: Report the rollback command
        run: |
          echo "Redeploy the most recent known-good function-app.zip artifact with:"
          echo "az functionapp deployment source config-zip --resource-group \"$RESOURCE_GROUP\" --name \"$FUNCTION_APP_NAME\" --src <known-good-function-app.zip> --build-remote false"
