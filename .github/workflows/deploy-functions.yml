# ─────────────────────────────────────────────────────────────────────────────
# deploy-functions.yml
# Builds and deploys the Azure Functions application.
#
# Implements design-document.md:
#   §11.1  Workflow files
#   §11.2  OIDC authentication strategy (no long-lived secrets)
#   §11.3.2  deploy-functions.yml exact job/step specification
#   §11.4  Multi-environment strategy (branch → environment mapping)
#   §11.5  Pipeline dependency order (runs after deploy-infra.yml)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Azure Functions

on:
  push:
    branches: [main, dev, staging]
    paths:
      - 'outputs/azure-functions/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]

# §11.2 — OIDC requires id-token: write
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to the same environment; never cancel in-progress
concurrency:
  group: deploy-functions-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  # ── Job 1: determine-environment ──────────────────────────────────────────
  # §11.3.2 — map branch/dispatch input to environment name
  # §11.4 — main → prod, staging → staging, dev → dev
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: build-and-deploy ────────────────────────────────────────────────
  # §11.3.2 — all steps in the exact order specified
  build-and-deploy:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd outputs/azure-functions
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set function app name
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          if [[ "$ENV" == "dev" ]]; then
            echo "FUNCTION_APP_NAME=${{ secrets.FUNCTION_APP_NAME_DEV }}" >> $GITHUB_ENV
          elif [[ "$ENV" == "staging" ]]; then
            echo "FUNCTION_APP_NAME=${{ secrets.FUNCTION_APP_NAME_STAGING }}" >> $GITHUB_ENV
          else
            echo "FUNCTION_APP_NAME=${{ secrets.FUNCTION_APP_NAME_PROD }}" >> $GITHUB_ENV
          fi

      - name: Deploy to Azure Functions
        id: deploy
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: outputs/azure-functions
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Health check
        run: |
          HOST=$(az functionapp show --name $FUNCTION_APP_NAME --resource-group rg-imageupload-${{ needs.determine-environment.outputs.environment }} --query defaultHostName -o tsv)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOST/api/files")
          if [[ "$STATUS" != "200" ]]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed: $STATUS"

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "::warning::Deploy step failed — to roll back, re-run this workflow"
          echo "  with the previous known-good commit, or run:"
          echo "  az functionapp deployment source config-zip \\"
          echo "    --resource-group rg-imageupload-${{ needs.determine-environment.outputs.environment }} \\"
          echo "    --name $FUNCTION_APP_NAME \\"
          echo "    --src <previous-function-app.zip>"
