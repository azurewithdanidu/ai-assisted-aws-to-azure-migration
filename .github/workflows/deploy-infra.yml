name: Deploy Infrastructure

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'outputs/bicep-templates/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  determine-environment:
    name: Determine environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      resource_group: ${{ steps.resolve.outputs.resource_group }}
      parameter_file: ${{ steps.resolve.outputs.parameter_file }}
    steps:
      - name: Determine environment from branch or manual input
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
          else
            case "${{ github.ref_name }}" in
              dev) environment="dev" ;;
              staging) environment="staging" ;;
              main) environment="prod" ;;
              *)
                echo "Unsupported branch: ${{ github.ref_name }}" >&2
                exit 1
                ;;
            esac
          fi

          echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-photo-gallery-${environment}" >> "$GITHUB_OUTPUT"
          echo "parameter_file=outputs/bicep-templates/parameters/${environment}.bicepparam" >> "$GITHUB_OUTPUT"

  validate:
    name: Lint and what-if
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      RESOURCE_GROUP: ${{ needs.determine-environment.outputs.resource_group }}
      PARAM_FILE: ${{ needs.determine-environment.outputs.parameter_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Cache the Bicep CLI
        uses: actions/cache@v4
        with:
          path: ~/.bicep
          key: ${{ runner.os }}-bicep-${{ hashFiles('outputs/bicep-templates/**/*.bicep') }}

      - name: Run Bicep lint
        run: az bicep lint --file outputs/bicep-templates/main.bicep

      - name: Run deployment what-if
        run: |
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file outputs/bicep-templates/main.bicep \
            --parameters "$PARAM_FILE" \
            --result-format FullResourcePayloads

  deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - validate
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      RESOURCE_GROUP: ${{ needs.determine-environment.outputs.resource_group }}
      PARAM_FILE: ${{ needs.determine-environment.outputs.parameter_file }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep modules
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file outputs/bicep-templates/main.bicep \
            --parameters "$PARAM_FILE" \
            --name "infra-${{ github.run_number }}" \
            --rollback-on-error \
            --query "properties.outputs" \
            --output json > bicep-outputs.json

      - name: Parse deployment outputs with jq
        run: |
          jq '{
            resourceGroupName: (.resourceGroupName.value // null),
            functionAppName: (.functionAppName.value // null),
            staticWebAppHostname: (.staticWebAppHostname.value // null),
            storageAccountName: (.storageAccountName.value // null),
            keyVaultUri: (.keyVaultUri.value // null),
            logAnalyticsWorkspaceId: (.logAnalyticsWorkspaceId.value // null)
          }' bicep-outputs.json > bicep-outputs.normalized.json
          mv bicep-outputs.normalized.json bicep-outputs.json
          jq . bicep-outputs.json

      - name: Upload deployment outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: bicep-outputs-${{ needs.determine-environment.outputs.environment }}
          path: bicep-outputs.json
          retention-days: 7

  rollback-report:
    name: Report failed deployment context
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - deploy
    if: failure()
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      RESOURCE_GROUP: ${{ needs.determine-environment.outputs.resource_group }}
    steps:
      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Report failed deployment and recent successful runs
        run: |
          echo "Deployment infra-${{ github.run_number }} failed. Azure rollback-on-error handled the resource rollback."
          az deployment group list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | reverse(@)[:5].{name:name,timestamp:properties.timestamp}" \
            --output table
