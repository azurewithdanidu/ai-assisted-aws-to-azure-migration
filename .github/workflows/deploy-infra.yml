# ─────────────────────────────────────────────────────────────────────────────
# deploy-infra.yml
# Deploys the Bicep infrastructure for the image-upload application.
#
# Implements design-document.md:
#   §11.1  Workflow files
#   §11.2  OIDC authentication strategy (no long-lived secrets)
#   §11.3.1  deploy-infra.yml exact job/step specification
#   §11.4  Multi-environment strategy (branch → environment mapping)
#   §11.5  Pipeline dependency order
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Infrastructure

on:
  push:
    branches: [main, dev, staging]
    paths:
      - 'outputs/bicep-templates/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]

# §11.2 — OIDC requires id-token: write
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to the same environment; never cancel in-progress
concurrency:
  group: deploy-infra-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  # ── Job 1: determine-environment ──────────────────────────────────────────
  # §11.3.1 — map branch/dispatch input to environment name
  # §11.4 — main → prod, staging → staging, dev → dev
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: deploy-infra ────────────────────────────────────────────────────
  # §11.3.1 — all steps in the exact order specified
  deploy-infra:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment variables
        id: env-vars
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          echo "RESOURCE_GROUP=rg-imageupload-${ENV}" >> $GITHUB_ENV

      - name: Create Resource Group (idempotent)
        run: |
          az group create --name $RESOURCE_GROUP --location australiaeast --output none

      - name: Bicep what-if validation
        run: |
          az deployment group what-if \
            --resource-group $RESOURCE_GROUP \
            --template-file outputs/bicep-templates/main.bicep \
            --parameters outputs/bicep-templates/parameters/${{ needs.determine-environment.outputs.environment }}.bicepparam \
            --mode Incremental

      - name: Deploy Bicep IaC
        id: deploy
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file outputs/bicep-templates/main.bicep \
            --parameters outputs/bicep-templates/parameters/${{ needs.determine-environment.outputs.environment }}.bicepparam \
            --mode Incremental \
            --name "infra-$(date +%Y%m%d%H%M%S)" \
            --output json > deployment-output.json
          echo "deploymentOutput=$(cat deployment-output.json | jq -c '.properties.outputs')" >> $GITHUB_OUTPUT

      - name: Export deployment outputs as summary
        run: |
          echo "## Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          cat deployment-output.json | jq '.properties.outputs' >> $GITHUB_STEP_SUMMARY

      - name: Tag resource group for traceability
        run: |
          az tag create \
            --resource-id "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RESOURCE_GROUP" \
            --tags \
              environment="${{ needs.determine-environment.outputs.environment }}" \
              deployedBy=github-actions \
              repo="${{ github.repository }}" \
              runId="${{ github.run_id }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Review what-if output and fix template errors." >> $GITHUB_STEP_SUMMARY
          echo "To rollback manually: az deployment group cancel --resource-group $RESOURCE_GROUP --name infra-<timestamp>"
