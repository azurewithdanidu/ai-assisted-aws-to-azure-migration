# ─────────────────────────────────────────────────────────────────────────────
# deploy-infra.yml
# Deploys the Bicep infrastructure for the image-upload application.
#
# Sections implemented:
#   §11.1  Workflow files
#   §11.2  OIDC authentication model
#   §11.3  deploy-infra.yml job/step specification
#   §11.6  OIDC RBAC requirements
#   §11.7  CI/CD quality gates (Bicep build + what-if gates)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'outputs/bicep-templates/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

# §11.2 — every deploy workflow must carry these permissions
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to the same environment; never cancel in-progress
concurrency:
  group: deploy-infra-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  # ── Job 1: validate ────────────────────────────────────────────────────────
  # §11.3 step 1 — checkout
  # §11.3 step 2 — Azure login via OIDC
  # §11.3 step 3 — az bicep build (lint gate, §11.7)
  # §11.3 step 4 — az deployment group what-if (preview gate, §11.7)
  validate:
    name: Lint and what-if
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || vars.ENVIRONMENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Cache the Bicep CLI binary to speed up repeated runs
      - name: Cache Bicep CLI
        uses: actions/cache@v4
        with:
          path: ~/.bicep
          key: ${{ runner.os }}-bicep-${{ hashFiles('outputs/bicep-templates/**/*.bicep') }}

      # §11.3 — az bicep build validates syntax and ARM compatibility
      - name: Bicep build (lint)
        run: az bicep build --file ${{ vars.BICEP_TEMPLATE }}

      # §11.3 — what-if shows the planned changes without deploying
      - name: Bicep what-if
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --template-file "${{ vars.BICEP_TEMPLATE }}" \
            --parameters "${{ vars.BICEP_PARAMETERS }}" \
            --mode Incremental \
            --result-format FullResourcePayloads

  # ── Job 2: deploy ──────────────────────────────────────────────────────────
  # §11.3 step 5 — az deployment group create
  # §11.3 — capture and publish critical deployment outputs
  deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment || vars.ENVIRONMENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # §11.3 — deploy, capture outputs; --rollback-on-error reverts on failure
      - name: Deploy Bicep
        id: deploy
        run: |
          az deployment group create \
            --name "deploy-${{ github.run_id }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --template-file "${{ vars.BICEP_TEMPLATE }}" \
            --parameters "${{ vars.BICEP_PARAMETERS }}" \
            --mode Incremental \
            --rollback-on-error \
            --query "properties.outputs" \
            --output json > bicep-outputs.json

      # §11.3 — parse the six critical outputs specified in the design doc
      - name: Parse deployment outputs
        run: |
          jq '{
            functionAppName:              (.functionAppName.value              // null),
            functionHostname:             (.functionHostname.value             // null),
            storageAccountName:           (.storageAccountName.value           // null),
            blobEndpoint:                 (.blobEndpoint.value                 // null),
            staticWebAppName:             (.staticWebAppName.value             // null),
            staticWebAppDefaultHostname:  (.staticWebAppDefaultHostname.value  // null)
          }' bicep-outputs.json | tee bicep-outputs.parsed.json
          mv bicep-outputs.parsed.json bicep-outputs.json

      # Persist outputs so downstream workflows can download them
      - name: Upload deployment outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: bicep-outputs-${{ inputs.environment || vars.ENVIRONMENT }}
          path: bicep-outputs.json
          retention-days: 7

      # §6 (Core Principles) — tag every deployed resource group for traceability
      - name: Tag resource group
        run: |
          az tag create \
            --resource-id "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.RESOURCE_GROUP_NAME }}" \
            --tags \
              environment="${{ inputs.environment || vars.ENVIRONMENT }}" \
              deployedBy=github-actions \
              repo="${{ github.repository }}" \
              runId="${{ github.run_id }}"

      # Rollback: redeploy HEAD~1 template when deploy step itself fails
      - name: Rollback IaC to previous commit
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deploy step failed — rolling back to previous commit's template."
          PREV_SHA=$(git rev-parse HEAD~1)
          git show "${PREV_SHA}:${{ vars.BICEP_TEMPLATE }}" > /tmp/main-prev.bicep
          az deployment group create \
            --name "rollback-${{ github.run_id }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --template-file /tmp/main-prev.bicep \
            --parameters "${{ vars.BICEP_PARAMETERS }}" \
            --mode Incremental

  # ── Job 3: rollback-report ─────────────────────────────────────────────────
  # Surface context after any job in this workflow fails
  rollback-report:
    name: Report failed deployment
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: failure()
    environment: ${{ inputs.environment || vars.ENVIRONMENT }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Show recent successful deployments
        run: |
          echo "::error::Deployment deploy-${{ github.run_id }} failed."
          echo "Last 5 successful deployments to ${{ vars.RESOURCE_GROUP_NAME }}:"
          az deployment group list \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --query "[?properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | reverse(@)[:5].{name:name,timestamp:properties.timestamp}" \
            --output table
