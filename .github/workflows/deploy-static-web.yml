# ─────────────────────────────────────────────────────────────────────────────
# deploy-static-web.yml
# Deploys the frontend SPA to Azure Static Web Apps.
#
# Implements design-document.md:
#   §11.1  Workflow files
#   §11.2  OIDC authentication strategy (no long-lived secrets)
#   §11.3.3  deploy-static-web.yml exact job/step specification
#   §11.4  Multi-environment strategy (branch → environment mapping)
#   §11.5  Pipeline dependency order (parallel with deploy-functions.yml, after deploy-infra.yml)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Static Web App

on:
  push:
    branches: [main, dev, staging]
    paths:
      - 'source-app/app-code/build/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]

# §11.2 — OIDC requires id-token: write
permissions:
  id-token: write
  contents: read

# Prevent concurrent deploys to the same environment; never cancel in-progress
concurrency:
  group: deploy-static-web-${{ github.ref_name }}-${{ inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  # ── Job 1: determine-environment ──────────────────────────────────────────
  # §11.3.3 — map branch/dispatch input to environment name
  # §11.4 — main → prod, staging → staging, dev → dev
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: deploy-static ──────────────────────────────────────────────────
  # §11.3.3 — all steps in the exact order specified
  deploy-static:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set SWA token
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          if [[ "$ENV" == "dev" ]]; then
            echo "SWA_TOKEN=${{ secrets.STATIC_WEB_APP_TOKEN_DEV }}" >> $GITHUB_ENV
          elif [[ "$ENV" == "staging" ]]; then
            echo "SWA_TOKEN=${{ secrets.STATIC_WEB_APP_TOKEN_STAGING }}" >> $GITHUB_ENV
          else
            echo "SWA_TOKEN=${{ secrets.STATIC_WEB_APP_TOKEN_PROD }}" >> $GITHUB_ENV
          fi

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: source-app/app-code/build
          output_location: ''
          skip_app_build: true

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "::warning::SWA deploy failed — to roll back, re-run this workflow"
          echo "  with the previous known-good commit, or use SWA built-in environment snapshots."
