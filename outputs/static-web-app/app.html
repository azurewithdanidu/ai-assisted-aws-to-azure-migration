<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Service</title>
    <!-- AWS SDK removed — replaced by plain fetch() with x-functions-key header -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .file-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #e0e0e0;
        }

        .file-info h3 {
            font-size: 1em;
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .file-info p {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 3px;
        }

        .file-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .tag {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Replaces .credentials-info (AWS-specific note) */
        .config-info {
            background: #e8f4fd;
            border: 1px solid #3498db;
            color: #1a5276;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .config-info strong {
            display: block;
            margin-bottom: 5px;
        }

        /* Replaces .credentials-status */
        .config-status {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden {
            display: none !important;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            width: 100%;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ─── Azure Configuration (replaces AWS Credentials card) ─── -->
        <div id="configCard" class="card">
            <h2 class="section-title">Azure Configuration</h2>

            <div class="config-info">
                <strong>Note:</strong>
                Enter your Azure Function App URL and the function key from the Azure Portal.
                These values are stored only in your browser session and are never transmitted to third parties.
            </div>

            <form id="configForm">
                <div class="form-group">
                    <label for="functionAppUrl">Function App URL *</label>
                    <!-- Replaces: AWS Access Key ID -->
                    <input type="text" id="functionAppUrl" placeholder="https://img-upload-dev-func.azurewebsites.net" required>
                </div>

                <div class="form-group">
                    <label for="functionKey">Function Key *</label>
                    <!-- Replaces: AWS Secret Access Key -->
                    <input type="password" id="functionKey" placeholder="Paste your function key from the Azure Portal" required>
                </div>

                <button type="submit" class="btn">Save Configuration</button>
                <div id="configStatus"></div>
            </form>
        </div>

        <!-- Configuration status bar (replaces AWS credentials status bar) -->
        <div id="configStatusBar" class="card config-status hidden">
            <span>Azure Function App configured</span>
            <!-- Replaces: clearCredentials() call -->
            <button class="btn btn-secondary" onclick="clearConfig()">Clear Configuration</button>
        </div>

        <!-- Main application (shown once configuration is saved) -->
        <div id="mainApp" class="hidden">

            <!-- Upload card -->
            <div class="card">
                <h2 class="section-title">Upload Image</h2>

                <form id="uploadForm">
                    <!-- userId field removed — was ignored by the backend -->

                    <div class="form-group">
                        <label for="fileInput">Select Image *</label>
                        <input type="file" id="fileInput" name="file" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Optional description of your image"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="e.g., vacation, 2024, beach">
                    </div>

                    <button type="submit" class="btn" id="uploadBtn">Upload Image</button>
                    <div id="uploadStatus"></div>
                </form>
            </div>

            <!-- Files list card -->
            <div class="card">
                <h2 class="section-title">My Images</h2>
                <button class="btn" id="refreshBtn" onclick="loadFiles()">Refresh List</button>
                <div id="filesList"></div>
            </div>

        </div><!-- /#mainApp -->

    </div><!-- /.container -->

    <script>
        // ─── Azure configuration ───────────────────────────────────────────
        // Replaces:
        //   const API_BASE_URL = 'https://<id>.execute-api.ap-southeast-2.amazonaws.com/dev';
        //   const AWS_REGION   = 'ap-southeast-2';
        //   let awsCredentials = null;

        let azureConfig = null;   // { functionAppUrl, functionKey }

        // Build the base API URL from the stored Function App URL.
        // Replaces: API_BASE_URL + path used in makeSignedRequest()
        function apiBaseUrl() {
            return azureConfig.functionAppUrl.replace(/\/$/, '') + '/api';
        }

        // ─── Plain fetch helper (replaces makeSignedRequest / SigV4 signing) ───
        //
        // AWS used:
        //   new AWS.Signers.V4(request, 'execute-api').addAuthorization(credentials, date)
        //
        // Azure uses:
        //   fetch(url, { headers: { 'x-functions-key': functionKey } })
        async function apiRequest(method, path, body = null) {
            const url = `${apiBaseUrl()}${path}`;
            const options = {
                method,
                headers: {
                    // Replaces: AWS SigV4 Authorization header
                    'x-functions-key': azureConfig.functionKey,
                    'Content-Type': 'application/json',
                },
            };
            if (body !== null) {
                options.body = JSON.stringify(body);
            }
            return fetch(url, options);
        }

        // ─── Configuration persistence (replaces credential storage) ───────
        function checkConfig() {
            const stored = sessionStorage.getItem('azureConfig');
            if (stored) {
                azureConfig = JSON.parse(stored);
                showMainApp();
            }
        }

        function showMainApp() {
            document.getElementById('configCard').classList.add('hidden');
            document.getElementById('configStatusBar').classList.remove('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadFiles();
        }

        // Replaces: clearCredentials()
        function clearConfig() {
            sessionStorage.removeItem('azureConfig');
            azureConfig = null;

            document.getElementById('configCard').classList.remove('hidden');
            document.getElementById('configStatusBar').classList.add('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('filesList').innerHTML = '';
        }

        // ─── Config form handler (replaces AWS credentials form) ────────────
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const functionAppUrl = document.getElementById('functionAppUrl').value.trim();
            const functionKey    = document.getElementById('functionKey').value.trim();
            const statusDiv      = document.getElementById('configStatus');

            try {
                statusDiv.innerHTML = '<div class="status info">Verifying connection to Azure Function App...</div>';

                // Replaces: STS.getCallerIdentity() credential verification
                // Light connectivity check — list files endpoint with empty result is fine
                const testResp = await fetch(
                    `${functionAppUrl.replace(/\/$/, '')}/api/files`,
                    { headers: { 'x-functions-key': functionKey } }
                );

                if (!testResp.ok && testResp.status !== 404) {
                    throw new Error(`HTTP ${testResp.status}: ${testResp.statusText}`);
                }

                azureConfig = { functionAppUrl, functionKey };
                sessionStorage.setItem('azureConfig', JSON.stringify(azureConfig));

                statusDiv.innerHTML = '<div class="status success">Connected to Azure Function App successfully!</div>';

                setTimeout(() => {
                    showMainApp();
                    document.getElementById('configForm').reset();
                }, 500);

            } catch (err) {
                console.error('Config error:', err);
                statusDiv.innerHTML = `<div class="status error">Could not connect to Function App: ${err.message}</div>`;
            }
        });

        // Check saved config on page load (replaces checkCredentials())
        window.addEventListener('load', checkConfig);

        // ─── Upload handler ──────────────────────────────────────────────────
        // AWS flow:
        //   1. POST /upload  → { uploadUrl (S3 endpoint), uploadFields (form fields) }
        //   2. FormData POST to S3 (multipart, fields embedded in body)
        //
        // Azure flow (replaces both steps above):
        //   1. POST /api/upload → { uploadUrl (Blob SAS URL), requiredHeaders }
        //   2. PUT file body directly to uploadUrl with requiredHeaders
        //      (x-ms-blob-type, Content-Type, x-ms-meta-* for metadata)
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput   = document.getElementById('fileInput');
            const description = document.getElementById('description').value;
            const tagsInput   = document.getElementById('tags').value;
            const uploadBtn   = document.getElementById('uploadBtn');
            const statusDiv   = document.getElementById('uploadStatus');

            if (!fileInput.files.length) {
                statusDiv.innerHTML = '<div class="status error">Please select a file</div>';
                return;
            }

            const file = fileInput.files[0];
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : [];

            try {
                uploadBtn.disabled = true;
                statusDiv.innerHTML = '<div class="status info">Requesting upload URL from Azure...</div>';

                // Step 1 — Get SAS URL
                // Replaces: makeSignedRequest('POST', '/upload', { userId, fileName, ... })
                const uploadResponse = await apiRequest('POST', '/upload', {
                    // userId removed — was ignored by the backend
                    fileName:    file.name,
                    fileType:    file.type,
                    description: description,
                    tags:        tags,
                });

                if (!uploadResponse.ok) {
                    const text = await uploadResponse.text();
                    throw new Error(`Failed to get upload URL: ${uploadResponse.statusText} — ${text}`);
                }

                const uploadData = await uploadResponse.json();

                // Step 2 — PUT file directly to Azure Blob Storage via SAS URL
                // Replaces: FormData POST to S3 presigned endpoint
                statusDiv.innerHTML = '<div class="status info">Uploading file to Azure Blob Storage...</div>';

                const blobResponse = await fetch(uploadData.uploadUrl, {
                    method: 'PUT',
                    // requiredHeaders includes: x-ms-blob-type, Content-Type, x-ms-meta-*
                    // Replaces: S3 presigned POST 'fields' dict (x-amz-meta-*, Content-Type, policy, etc.)
                    headers: uploadData.requiredHeaders,
                    body:    file,   // raw file bytes — replaces FormData with file appended last
                });

                if (!blobResponse.ok) {
                    const text = await blobResponse.text();
                    throw new Error(`Failed to upload to Blob Storage: ${blobResponse.statusText} — ${text}`);
                }

                statusDiv.innerHTML = `<div class="status success">File uploaded successfully! File ID: ${uploadData.fileId}</div>`;

                // Reset form
                document.getElementById('fileInput').value    = '';
                document.getElementById('description').value  = '';
                document.getElementById('tags').value         = '';

                // Refresh file list
                setTimeout(() => loadFiles(), 1000);

            } catch (err) {
                console.error('Upload error:', err);
                statusDiv.innerHTML = `<div class="status error">Upload failed: ${err.message}</div>`;
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // ─── Load files ──────────────────────────────────────────────────────
        // Replaces: makeSignedRequest('GET', `/files?userId=...`)
        // userId / prefix removed — Azure function returns all blobs by default.
        async function loadFiles() {
            const filesList  = document.getElementById('filesList');
            const refreshBtn = document.getElementById('refreshBtn');

            try {
                refreshBtn.disabled = true;
                filesList.innerHTML = '<div class="loading"><div class="spinner"></div>Loading files...</div>';

                // Replaces: makeSignedRequest('GET', `/files?userId=${...}`)
                const response = await apiRequest('GET', '/files');

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Failed to load files: ${response.statusText} — ${text}`);
                }

                const data = await response.json();

                if (data.files.length === 0) {
                    filesList.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2
                                         2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0
                                         00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p>No images uploaded yet</p>
                        </div>
                    `;
                } else {
                    const filesHTML = data.files.map(file => `
                        <div class="file-item" id="file-${file.fileId}">
                            <img src="${file.viewUrl}"
                                 alt="${escapeHtml(file.fileName)}"
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\'
                                     viewBox=\'0 0 24 24\'%3E%3Ctext x=\'50%25\' y=\'50%25\'
                                     dominant-baseline=\'middle\' text-anchor=\'middle\'
                                     fill=\'%23999\'%3EImage%3C/text%3E%3C/svg%3E'">
                            <div class="file-info">
                                <h3>${escapeHtml(file.fileName)}</h3>
                                <p><strong>File ID:</strong> ${escapeHtml(file.fileId)}</p>
                                ${file.description ? `<p><strong>Description:</strong> ${escapeHtml(file.description)}</p>` : ''}
                                <p><strong>Uploaded:</strong> ${new Date(file.uploadDate).toLocaleString()}</p>
                                ${file.tags && file.tags.length > 0 ? `
                                    <div class="file-tags">
                                        ${file.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                                    </div>
                                ` : ''}
                                <button class="btn-delete"
                                        onclick="deleteFile('${escapeHtml(file.fileId)}', '${escapeHtml(file.fileName).replace(/'/g, "\\'")}')">
                                    Delete
                                </button>
                            </div>
                        </div>
                    `).join('');

                    filesList.innerHTML = `<div class="file-grid">${filesHTML}</div>`;

                    if (data.isTruncated) {
                        filesList.innerHTML += '<div class="status info">More files available. Increase maxKeys to load more.</div>';
                    }
                }

            } catch (err) {
                console.error('Load files error:', err);
                filesList.innerHTML = `<div class="status error">Failed to load files: ${err.message}</div>`;
            } finally {
                refreshBtn.disabled = false;
            }
        }

        // ─── Delete file ─────────────────────────────────────────────────────
        // Replaces: makeSignedRequest('DELETE', `/files/${fileId}?userId=...`)
        async function deleteFile(fileId, fileName) {
            if (!confirm(`Are you sure you want to delete "${fileName}"?`)) {
                return;
            }

            try {
                const fileElement = document.getElementById(`file-${fileId}`);
                const deleteBtn   = fileElement ? fileElement.querySelector('.btn-delete') : null;
                if (deleteBtn) { deleteBtn.disabled = true; deleteBtn.textContent = 'Deleting...'; }

                // Replaces: makeSignedRequest('DELETE', `/files/${fileId}?userId=...`)
                const response = await apiRequest('DELETE', `/files/${encodeURIComponent(fileId)}`);

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Failed to delete file: ${response.statusText} — ${text}`);
                }

                if (fileElement) fileElement.remove();

                const filesList = document.getElementById('filesList');
                const msg = document.createElement('div');
                msg.className = 'status success';
                msg.textContent = `"${fileName}" deleted successfully`;
                filesList.insertBefore(msg, filesList.firstChild);
                setTimeout(() => msg.remove(), 3000);

                if (document.querySelectorAll('.file-item').length === 0) {
                    loadFiles();
                }

            } catch (err) {
                console.error('Delete error:', err);
                alert(`Failed to delete file: ${err.message}`);

                const fileElement = document.getElementById(`file-${fileId}`);
                if (fileElement) {
                    const deleteBtn = fileElement.querySelector('.btn-delete');
                    if (deleteBtn) { deleteBtn.disabled = false; deleteBtn.textContent = 'Delete'; }
                }
            }
        }

        // ─── XSS helper ─────────────────────────────────────────────────────
        // Escapes user-controlled content before inserting into innerHTML.
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }
    </script>
</body>
</html>
